        <script>
            $.ajax({
                url : "https://www.w3schools.com/appml/customers.php",
                method : "GET",
                success : (posRes)=>{
                    let obj = JSON.parse(posRes)
                    let {records} = obj
                    document.write(`<table border="1" align="center" cellpadding="10" cellspacing="10">
                                <tr>
                                    <th>CustomerName</th>
                                    <th>City</th>
                                    <th>Country</th>
                                </tr>`)
                    records.forEach((element,index)=>{
                        document.write(`<tr>
                            <td>${element.CustomerName}</td>
                            <td>${element.City}</td>
                            <td>${element.Country}</td>
                            </tr>`)
                    })
                    document.write(`</table>`)
                },
                error : (errRes)=>{
                    document.write(errRes)
                }
            })
        </script>
