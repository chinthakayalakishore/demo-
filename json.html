        <script>
    let emps = [
    {empId:"e101",empName:"Emp1",empDept:"CSE",empImg:"https://picsum.photos/80?random=1"},
    {empId:"e102",empName:"Emp2",empDept:"ECE",empImg:"https://picsum.photos/80?random=2"},
    {empId:"e103",empName:"Emp3",empDept:"EEE",empImg:"https://picsum.photos/80?random=3"},
    {empId:"e104",empName:"Emp4",empDept:"IT",empImg:"https://picsum.photos/80?random=4"},
    {empId:"e105",empName:"Emp5",empDept:"CIVIL",empImg:"https://picsum.photos/80?random=5"}
];

    document.write(`
        <table border="1" align="center" cellpadding="10" cellspacing="10">
            <tr>
                <th>empId</th>
                <th>empName</th>
                <th>empDept</th>
                <th>empImg</th>
            </tr>
    `);

    emps.forEach((element) => {
        document.write(`
            <tr>
                <td>${element.empId}</td>
                <td>${element.empName}</td>
                <td>${element.empDept}</td>
                <td>
                    <img src="${element.empImg}" width="80">
                </td>
            </tr>
        `);
    });

    document.write(`</table>`);
</script>
