<!DOCTYPE html>
<html>
    <head>
        <title>Tables with CSS</title>
         <link rel="stylesheet"
         href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <style>
            table{
                width: 50%;
                text-align: center;
                margin: 100px auto;
                border: 1px solid gray;
                border-collapse: collapse;
            }
            th,td{
                border: 1px solid black;
            }
            th{
                height: 75px;
            }
            td{
                height: 50px;
            }
            tr:nth-child(even){
                background-color: gray;
                color: white;
            }
            tr:nth-child(odd){
                background-color: lightgrey;
                color: white;
            }
        </style>
    </head>
    <body>
        <table>
            <tr>
                <th>SNO</th>
                <th>NAME</th>
                <th>COST</th>
                <th>UPDATE</th>
                <th>DELETE</th>
            </tr>
            <tr>
                <td>1</td>
                <td>Laptop</td>
                <td><i class="fa fa-inr"></i></td>
                <td><i class="fa fa-edit"></i></td>
                <td><i class="fa fa-trash"></i></td>
            </tr>
            <tr>
                <td>2</td>
                <td>mobile</td>
                <td><i class="fa fa-dollar">50</i></td>
                <td><i class="fa fa-edit"></i></td>
                <td><i class="fa fa-trash"></i></td>
            </tr>
            <tr>
                <td>1</td>
                <td>shoes</td>
                <td><i class="fa fa-dollar">10</i></td>
                <td><i class="fa fa-edit"></i></td>
                <td><i class="fa fa-trash"></i></td>
            </tr>
        </table>
    </body>
</html>
