<!DOCTYPE html>
<html>
    <head>
        <title>relative position</title>
        <style>
            div{
                border: 3px solid black;
                width: 100px;
                height: 100px;
            }
            .c1{
                background-color: aqua;

            }
            .c2{
                background-color: blanchedalmond;
                 position: relative;
                left: 20px;
                bottom: 80px;
            }
            .c3{
                background-color: orange;
                 position: relative;
                left: 40px;
                bottom: 160px;
            }
            .c4{
                background-color: yellow;
                 position: relative;
                left: 60px;
                bottom: 240px;
            }
            .c5{
                background-color: beige;
                 position: relative;
                left: 80px;
                bottom: 320px;
            }
        </style>
    </head>
    <body>
        <div class="c1">1</div>
        <div class="c2">2</div>
        <div class="c3">3</div>
        <div class="c4">4</div>
        <div class="c5">5</div>
    </body>
</html>
