<!DOCTYPE html>
<html>
    <head>
  <title>CSS Grid</title>
  <style>
    .parent{
        height: 100vh;
        text-align: center;
        color: white;
        display: grid;
        grid-template-rows: 10% 30% 50% 10%;
        grid-template-columns:25% 25% 25% 25% ;
        gap:10px;
            
    }
    .header{
 background-color: orange;
    grid-column: 1/5;
    grid-row: 1/2;
    }
    .small1{
 background-color: orange;
    grid-column: 1/2;
    grid-row: 2/3;
    }
    .small2{
        grid-column: 2/3;
    grid-row: 2/3;
 background-color: orange;
    }
    .small3{
 background-color: orange;
        grid-column: 3/4;
    grid-row: 2/3;
    }
    .content{
 background-color: orange;
        grid-column: 1/4;
    grid-row: 3/4;
    }
    .side{
         background-color: orange;
        grid-column: 4/5;
    grid-row: 2/4;

    }
    .footer{
 background-color: orange;
        grid-column: 1/5;
    grid-row: 4/5;
    }
    
  </style>
    </head>
    <body>
        <div class="parent">
             <div class="header">Header</div>
             <div class="small1">Small Box</div>
             <div class="small2">Small Box</div>
             <div class="small3">Small Box</div>
             <div class="content">Main Content</div>
            <div class="side">Sidebar</div>
            <div class="footer">Footer</div>
        </div>
    </body>
</html>
