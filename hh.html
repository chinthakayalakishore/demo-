<!DOCTYPE html>
<html>
<head>
    <title>DOB Dropdown</title>
</head>
<body>

<h3>Date of Birth</h3>

<!-- Day Dropdown -->
<select name="day">
    <option value="">Day</option>
    <option>1</option>
    <option>2</option>
    <option>3</option>
    <option>4</option>
    <option>5</option>
</select>

<!-- Month Dropdown -->
<select name="month">
    <option value="">Month</option>
    <option>January</option>
    <option>February</option>
    <option>March</option>
    <option>April</option>
    <option>May</option>
</select>

<!-- Year Dropdown -->
<select name="year">
    <option value="">Year</option>
    <option>2005</option>
    <option>2006</option>
    <option>2007</option>
    <option>2008</option>
    <option>2009</option>
</select>

</body>
</html>
