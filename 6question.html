<!DOCTYPE html>
<html>
    <head>
        <title>Tables with CSS</title>
        <h2 align="center"  >CREATE TABLE IN HTML</h2>
        <style>
            table{
                width: 50%;
                text-align: center;
                border: 1px solid gray;
            }
            th,td{
                border: 1px solid gray;
            }
            th{
                height: 75px;
            }
            td{
                height: 50px;
            }
            tr:nth-child(4){
                text-align: left;
            }
            
        </style>
    </head>
    <body>
        <table border="1" align="center">
            <tr>
                <th>Column 1</th>
                <th>Column 2</th>
                <th>Column 3</th>
            </tr>
            <tr>
                <td rowspan="2">Row 1 Cell 1</td>
                <td>Row 1 Cell 2</td>
                <td>Row 1 Cell 3</td>
            </tr>
             <tr>
                <td>Row 2 Cell 2</td>
                <td>Row 2 Cell 3</td>
            </tr>
            <tr>
                <td colspan="3">Row 3 Cell 1</td>
            </tr>
        </table>
    </body>
</html>
