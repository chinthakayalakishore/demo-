<!DOCTYPE html>
<html>
    <head>
        <title>CSS flex</title>
        <style>
            .parent{
                display: flex;
                gap: 20px;
               /* justify-content: center;
                height: 100vh;
                align-items: center;
                flex-direction: column-reverse;
                flex-wrap: wrap;*/

            }
            .c1 , .c2 , .c3{
                width: 175px;
                height: 100px;
                color: white;
                border: 1px solid gray;
            }
            .c1{
                background-color: blueviolet;
                order: 10;
                flex: 1;
            }
            .c2{
                background-color: aqua;
                order: 9;
                flex: 1;
            }
            .c3{
                background-color: brown;
                flex: 1;
            }
        </style>
    </head>
    <body>
        <div class="parent">
            <div class="c1">1</div>
            <div class="c2">2</div>
            <div class="c3">3</div>
        </div>
    </body>
</html>
