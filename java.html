<!DOCTYPE html>
<html>
    <head>
        <title>javascript basics</title>
    </head>
    <body>
        <script>
            document.write("welcome to java basics", "<br>");
            console.log("Debugging soon!!");
            console.table([10,20,30,40,50]);


            document.write(10 + 10, "<br>");
            document.write(10 + "10", "<br>");
            document.write(10+ +"10", "<br>");
            document.write(10 -"10");
            document.write(10 * "10");
            document.write(10 / "10");

            //true=o
            //flase=0
            document.write(1+true,"<br>");
             document.write(1+"true","<br>");
             document.write(1+true+true+false,"<br>");
             document.write(1/false,"<br>");
             document.write(true+true,"<br>");
             document.write(false/true,"<br>");

             //=assignment
             //==comparision
             //===strict comparision
             document.write(10 == "10","<br>");  //true
             document.write(10 === "10","<br>"); //false
             document.write(10 == "one","<br>"); //false
             document.write(10 === "one","<br>"); //false

             /*what are the difference between == and ===?
                     ==                                              ===
            1.compares left operand value with         1.compares left operand value with datatype to
                 right operand value                       right operand value with datatype
            2.ignores datatype                         2.consider datatype
             */ 
            document.write(10>9>8,"<br>") //false
            document.write(1<2<3,"<br>");

            document.write(10+5/10-5,"<br>") //5.5
            //BODMAS rule
            //bracket
            //of
            //division
            //multiplication
            //addition
            //subtraction
             document.write( (10+5)/(10-5),"<br>") //3

             //ternary operator
             //condition ? block 1 :block2
             true ? document.write("frontend","<br>"):document.write("Backend","<br>");
            !true ? document.write("frontend","<br>"):document.write("Backend","<br>");
             false ? document.write("frontend","<br>"):document.write("Backend","<br>");
             !false ? document.write("frontend","<br>"):document.write("Backend","<br>");
             10>9>8 ? document.write("frontend","<br>"):document.write("Backend","<br>");
            !(10>9>8) ? document.write("frontend","<br>"):document.write("Backend","<br>");
            
        </script>    
    </body>
</html>
