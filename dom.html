    <body>
        <ul id="my_ul"></ul>

        <script>
            let frag = document.createDocumentFragment()
            for(let i=0;i<5;i++){
                let li = document.createElement("li")
                li.textContent = "text"+i
                frag.appendChild(li)
            }
            ul = document.getElementById("my_ul");
            ul.appendChild(frag)
        </script>
