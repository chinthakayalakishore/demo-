<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>
<script src="login.js"></script>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:linear-gradient(to right,#4facfe,#00f2fe);
}

.login-box{
    width:350px;
    background:white;
    padding:30px;
    margin:100px auto;
    border-radius:15px;
    box-shadow:0px 0px 20px gray;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:1px solid gray;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    margin-top:20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

span{
    color:red;
    font-size:14px;
}
</style>

</head>

<body>

<div class="login-box">
<h2>Login Form</h2>

<form name="logForm" onsubmit="return register()">

<label>User Name</label>
<input type="text" name="uname" placeholder="Enter Username">
<span id="uname_errors"></span>

<br><br>

<label>Password</label>
<input type="password" name="pswd" placeholder="Enter Password">
<span id="pswd_errors"></span>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
