<!DOCTYPE html>
<html>
    <head>
        <title>Form Validations</title>
        <link rel="stylesheet" href="validations.css">
        <script src="validations.js"></script>
    </head>
    <body>
        <form name="regForm" onsubmit="return register()">
            <table>
                <!--first name-->
                <tr>
                    <td>
                        <label>First Name</label>
                    </td>
                    <td>
                        <input type="text" name="fname" placeholder="enter first name">
                    </td>
                    <td>
                        <span id="fname_errors"></span>
                    </td>

                </tr>

                <!--last name-->

            <tr>
                    <td>
                        <label>last Name</label>
                    </td>
                    <td>
                        <input type="text" name="lname" placeholder="enter last name">
                    </td>
                    <td>
                        <span id="lname_errors"></span>
                    </td>

                </tr>

                <!--password-->

                <tr>
                    <td>
                        <label>password</label>
                    </td>
                    <td>
                        <input type="password" name="pswd" placeholder="enter password">
                    </td>
                    <td>
                        <span id="pswd_errors"></span>
                    </td>

                </tr>

                <tr>
                    <td>
                    <input type="submit" value="register">
                    </td>
                </tr>
            </table>
        </form>
    </body>
</html>
