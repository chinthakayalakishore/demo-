<!DOCTYPE html>
<html>
    <head>
        <title>images</title>
        <style>
            img{
                border: 5px solid red;
                border-radius: 30px;
                padding: 20px;
                margin: 20px;
            }
            .c1:hover{
                border: 10px solid yellow;
            }
            .c2{
                padding: 0%;
                border-radius: 100%;
            }
            .c3:hover{
                display: none;
            }
        </style>
    </head>
    <body>
        <img src="myntra.png" alt="myntra" class="c1">
        <img src="netflix.png" alt="netflixx" class="c2">
        <img src="carrer it.png" alt="carrer it" class="c3">

    </body>
</html>
