<!DOCTYPE html>
<html>
    <head>
        <title>absolute position</title>
        <style>
            button{
                position: absolute;
                left: 250px;
                top: 30px;
            }
            fieldset{
                width: 20%;
                margin: 100px auto;
                border-radius: 30px;
                position: relative;
            }
        </style>
    </head>
    <body>
        <fieldset>
            <legend>LOGIN</legend>
            <input type="text" name="username" placeholder="enter user name">
            <br><br>
            <input type="password" name="pwd" placeholder="enter password">
            <br><br>
            <button>login</button>
        </fieldset>
    </body>
</html>
