<!DOCTYPE html>
<html>
    <head>
        <title>marquee text </title>
    </head>
    <body>
        <marquee>
            <h1>HTML</h1>
        </marquee>
        <marquee direction="right">
            <h1>HTML</h1>
        </marquee>
        <marquee direction="up">
            <h1>HTML</h1>
        </marquee>
        <marquee direction="down">
            <h1>HTML</h1>
        </marquee>
         <marquee width="50%">
            <h1>HTML</h1>
        </marquee>
         <marquee scrollamount="1000">
            <h1>HTML</h1>
        </marquee>
    </body>
</html>
